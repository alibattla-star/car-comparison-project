
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Comparison Project</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }

    h1 {
      background-color: #333;
      color: white;
      padding: 15px;
      margin: 0;
      text-align: center;
    }

    /* main layout */
    .container {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    /* sidebar */
    .sidebar {
      background-color: white;
      padding: 15px;
      width: 200px;
      border: 1px solid #ccc;
      height: fit-content;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .sidebar label {
      display: block;
      margin-bottom: 8px;
    }

    /* price slider stuff */
    #priceSlider {
      width: 100%;
    }

    #priceDisplay {
      font-weight: bold;
    }

    /* car grid */
    .car-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      flex: 1;
    }

    .car-card {
      background-color: white;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 5px;
    }

    .car-card h2 {
      font-size: 18px;
      margin-top: 0;
      color: #333;
    }

    .car-card p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }

    .car-card .price {
      color: green;
      font-weight: bold;
      font-size: 16px;
    }

    .car-card ul {
      padding-left: 18px;
      font-size: 13px;
      color: #666;
    }

    .type-badge {
      display: inline-block;
      background-color: #333;
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 8px;
    }

    #noResults {
      display: none;
      font-size: 16px;
      color: #888;
      padding: 20px;
    }
  </style>
</head>
<body>

  <h1>Car Comparison Website</h1>

  <div class="container">

    <!-- sidebar filters -->
    <div class="sidebar">
      <h3>Filter by Type</h3>

      <label><input type="checkbox" class="typeCheck" value="SUV" checked> SUV</label>
      <label><input type="checkbox" class="typeCheck" value="Sedan" checked> Sedan</label>
      <label><input type="checkbox" class="typeCheck" value="Sports" checked> Sports</label>
      <label><input type="checkbox" class="typeCheck" value="Electric" checked> Electric</label>
      <label><input type="checkbox" class="typeCheck" value="Truck" checked> Truck</label>

      <hr>

      <h3>Max Price</h3>
      <p>Up to: <span id="priceDisplay">$200,000</span></p>
      <input type="range" id="priceSlider" min="20000" max="200000" step="5000" value="200000">
    </div>

    <!-- car cards go here -->
    <div>
      <p id="noResults">No cars match your filters.</p>
      <div class="car-grid" id="carGrid"></div>
    </div>

  </div>

  <script>

    // car data array
    var cars = [
      {
        name: "2026 Tesla Model Y Juniper",
        type: "Electric",
        price: 47990,
        features: ["330 mile range", "Autopilot", "0-60 in 4.8s", "15.4 inch touchscreen"]
      },
      {
        name: "2025 Chevy Corvette Stingray",
        type: "Sports",
        price: 69995,
        features: ["6.2L V8 490hp", "0-60 in 2.9s", "Removable roof", "Bose audio system"]
      },
      {
        name: "2025 Chevy Tahoe Z71",
        type: "SUV",
        price: 62500,
        features: ["8 passenger seating", "V8 355hp", "Tows up to 8400 lbs", "Off road suspension"]
      },
      {
        name: "2025 Toyota Camry XSE",
        type: "Sedan",
        price: 34000,
        features: ["Hybrid 52mpg", "10.5 inch screen", "Wireless CarPlay", "Lane assist"]
      },
      {
        name: "2025 Jeep Grand Cherokee 4xe",
        type: "SUV",
        price: 59995,
        features: ["Plug-in hybrid", "25 mile electric range", "Air suspension", "4x4 system"]
      },
      {
        name: "2025 Tesla Model 3 Performance",
        type: "Electric",
        price: 54990,
        features: ["315 mile range", "0-60 in 2.9s", "Dual motor AWD", "OTA updates"]
      },
      {
        name: "2025 Honda Accord Sport",
        type: "Sedan",
        price: 31500,
        features: ["1.5L turbo", "Google Maps built in", "Honda Sensing", "Wireless Android Auto"]
      },
      {
        name: "2025 Ford F-150 Raptor",
        type: "Truck",
        price: 79995,
        features: ["450hp twin turbo V6", "Fox shocks", "37 inch tires", "Off road modes"]
      }
    ];

    // renders the cards based on filters
    function showCars() {
      var grid = document.getElementById("carGrid");
      grid.innerHTML = "";

      // get checked types
      var checkedTypes = [];
      var checkboxes = document.querySelectorAll(".typeCheck");
      for (var i = 0; i < checkboxes.length; i++) {
        if (checkboxes[i].checked) {
          checkedTypes.push(checkboxes[i].value);
        }
      }

      var maxP = parseInt(document.getElementById("priceSlider").value);

      // filter the array
      var filtered = [];
      for (var i = 0; i < cars.length; i++) {
        if (checkedTypes.includes(cars[i].type) && cars[i].price <= maxP) {
          filtered.push(cars[i]);
        }
      }

      if (filtered.length == 0) {
        document.getElementById("noResults").style.display = "block";
      } else {
        document.getElementById("noResults").style.display = "none";
      }

      // build each card
      for (var i = 0; i < filtered.length; i++) {
        var car = filtered[i];

        var card = document.createElement("div");
        card.className = "car-card";

        var badge = document.createElement("span");
        badge.className = "type-badge";
        badge.innerText = car.type;

        var name = document.createElement("h2");
        name.innerText = car.name;

        var price = document.createElement("p");
        price.className = "price";
        price.innerText = "$" + car.price.toLocaleString();

        var featTitle = document.createElement("p");
        featTitle.innerText = "Top Features:";

        var featList = document.createElement("ul");
        for (var j = 0; j < car.features.length; j++) {
          var li = document.createElement("li");
          li.innerText = car.features[j];
          featList.appendChild(li);
        }

        card.appendChild(badge);
        card.appendChild(name);
        card.appendChild(price);
        card.appendChild(featTitle);
        card.appendChild(featList);

        grid.appendChild(card);
      }
    }

    // event listeners for filters
    var checkboxes = document.querySelectorAll(".typeCheck");
    for (var i = 0; i < checkboxes.length; i++) {
      checkboxes[i].addEventListener("change", showCars);
    }

    document.getElementById("priceSlider").addEventListener("input", function() {
      var val = parseInt(this.value);
      document.getElementById("priceDisplay").innerText = "$" + val.toLocaleString();
      showCars();
    });

    // run on page load
    showCars();

  </script>

</body>
</html>
